name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev, 'refactor/**']

jobs:
  test:
    name: Unit + Integration + Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter backend build:check

      - name: Run tests with coverage
        run: pnpm --filter backend test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/backend/coverage/
          retention-days: 14

  bench:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    # Runs only on push to main (not on PRs to avoid time cost)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: pnpm --filter backend test:bench

      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: packages/backend/bench-results.json
          retention-days: 30
